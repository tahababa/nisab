name: Nisab Al Zakat — Update (6x Daily)

on:
  schedule:
    - cron: '0 0  * * *'   # 00:00 GMT
    - cron: '0 4  * * *'   # 04:00 GMT
    - cron: '0 8  * * *'   # 08:00 GMT
    - cron: '0 12 * * *'   # 12:00 GMT
    - cron: '0 16 * * *'   # 16:00 GMT
    - cron: '0 20 * * *'   # 20:00 GMT
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-nisab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch prices and update nisab JSON
        env:
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
        run: node scripts/update.js

      - name: Commit and push
        run: |
          git config user.name  "nisab-bot"
          git config user.email "bot@tahababa.com"
          git add nisab.json history/
          git diff --staged --quiet || git commit -m "chore: update nisab $(date -u +%Y-%m-%dT%H:%M)GMT"
          git push
